<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>تنظيف بيانات الاستشاريين والموردين</title>
<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-firestore-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-auth-compat.js"></script>
<link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;700;900&display=swap" rel="stylesheet">
<style>
body{font-family:'Cairo',sans-serif;background:#eef3f9;padding:16px;max-width:600px;margin:0 auto}
.card{background:white;border-radius:14px;padding:16px;margin-bottom:12px;box-shadow:0 2px 16px rgba(26,58,110,.09)}
h1{color:#1a3a6e;font-size:17px;margin-bottom:16px;text-align:center}
.btn{width:100%;padding:13px;border:none;border-radius:10px;font-family:'Cairo',sans-serif;font-size:14px;font-weight:700;cursor:pointer;margin-bottom:8px}
.btn-blue{background:linear-gradient(135deg,#1a3a6e,#0094cc);color:white}
.btn-green{background:linear-gradient(135deg,#00703a,#00b894);color:white}
.btn-red{background:linear-gradient(135deg,#e05050,#c0392b);color:white}
.log{background:#1a2a3a;border-radius:10px;padding:12px;max-height:300px;overflow-y:auto;font-size:11px;color:#a8d8ea;font-family:monospace;direction:ltr;margin-top:10px}
.stat{font-size:20px;font-weight:900;color:#0094cc;text-align:center;margin:8px 0}
.issue{background:#fff8e1;border:1px solid #f0c040;border-radius:8px;padding:10px;margin-bottom:8px;font-size:11px}
.issue-name{font-weight:700;color:#1a2a3a;margin-bottom:4px}
.issue-detail{color:#6b7a8d}
input[type=password]{width:100%;padding:10px;border:2px solid #dde6f0;border-radius:10px;font-family:Cairo,sans-serif;font-size:14px;margin-bottom:8px}
</style>
</head>
<body>
<h1>🔧 تنظيف بيانات الاستشاريين والموردين</h1>

<div class="card" id="login-card" style="display:none">
  <div style="font-size:13px;font-weight:700;margin-bottom:8px">🔐 دخول الأدمن</div>
  <input type="password" id="pass" placeholder="كلمة السر">
  <button class="btn btn-blue" onclick="doLogin()">دخول بكلمة السر</button>
</div>

<div class="card" id="main-card">
  <div id="fb-status" style="color:#00b894;font-weight:700;margin-bottom:12px">⏳ جاري الاتصال...</div>
  <div style="display:flex;gap:8px;margin-bottom:12px">
  <button class="btn btn-blue" style="flex:1;padding:8px" onclick="setCol('consultants',this)" id="btn-cons">👨‍💼 استشاريين</button>
  <button class="btn btn-green" style="flex:1;padding:8px;opacity:.6" onclick="setCol('suppliers',this)" id="btn-sups">🏭 موردين</button>
</div>
<div class="stat" id="total-count">0 سجل</div>
  <div class="stat" id="issues-count" style="color:#e05050;font-size:16px">0 سجل فيه مشكلة</div>
  <button class="btn btn-blue" onclick="scanData()">🔍 فحص البيانات</button>
  <button class="btn btn-green" onclick="fixData()" id="fix-btn" style="display:none">🔧 إصلاح تلقائي للبيانات</button>
  <div id="issues-list" style="margin-top:10px"></div>
  <div class="log" id="log" style="display:none"></div>
</div>

<script>
const firebaseConfig = {
  apiKey: "AIzaSyCk98_i0ozMuQumsO4PUDpXGRga5aWI4C8",
  authDomain: "tanmoyeen-masr26.firebaseapp.com",
  projectId: "tanmoyeen-masr26",
  storageBucket: "tanmoyeen-masr26.firebasestorage.app",
  messagingSenderId: "335780209700",
  appId: "1:335780209700:web:c2839bb31364b5b18664b1"
};
firebase.initializeApp(firebaseConfig);
const db = firebase.firestore();
const auth = firebase.auth();

function doLogin(){
  var pass = document.getElementById('pass').value;
  if(!pass){ alert('ادخل كلمة السر'); return; }
  document.getElementById('login-card').style.display='none';
  document.getElementById('main-card').style.display='block';
  // Try auth for collections that need it
  auth.signInWithEmailAndPassword('elzieni2007@gmail.com', pass)
    .then(function(){ log('✅ تم تسجيل الدخول', '#00b894'); })
    .catch(function(e){ log('⚠️ بدون auth: '+e.code, '#f9ca24'); });
}

// Auto-connect
window.addEventListener('load', function(){
  document.getElementById('fb-status').textContent = '⏳ جاري الاتصال...';
  var t = setTimeout(function(){
    document.getElementById('fb-status').textContent = '✅ جاهز - اختار قسم واضغط فحص';
    document.getElementById('fb-status').style.color = '#00b894';
  }, 3000);
  db.collection('suppliers').limit(1).get()
    .then(function(){
      clearTimeout(t);
      document.getElementById('fb-status').textContent = '✅ متصل - اختار قسم واضغط فحص';
      document.getElementById('fb-status').style.color = '#00b894';
    }).catch(function(){
      clearTimeout(t);
      document.getElementById('fb-status').textContent = '✅ جاهز - اختار قسم واضغط فحص';
      document.getElementById('fb-status').style.color = '#00b894';
    });
});

var allDocs = [];
var currentCol = 'consultants';

function setCol(col, btn){
  currentCol = col;
  document.querySelectorAll('.btn').forEach(function(b){ b.style.opacity='0.6'; });
  btn.style.opacity='1';
  allDocs=[]; issuesList=[];
  document.getElementById('total-count').textContent='0 سجل';
  document.getElementById('issues-count').textContent='0 مشكلة';
  document.getElementById('issues-list').innerHTML='';
  document.getElementById('fix-btn').style.display='none';
}
var issuesList = [];

function log(msg, color){
  var l = document.getElementById('log');
  l.style.display='block';
  l.innerHTML += '<div style="color:'+(color||'#a8d8ea')+'">'+msg+'</div>';
  l.scrollTop = l.scrollHeight;
}

function isPhone(val){ return val && /^[0-9]{10,11}$/.test(String(val).replace(/\s/g,'').replace(/^\+?2/,'')); }
function isEmail(val){ return val && String(val).includes('@'); }
function isGov(val){
  var govs = ['القاهرة','الجيزة','الإسكندرية','أسيوط','سوهاج','قنا','الأقصر','أسوان','المنيا','بني سويف','الفيوم','المنوفية','الغربية','الدقهلية','الشرقية','كفر الشيخ','البحيرة','دمياط','بورسعيد','الإسماعيلية','السويس','شمال سيناء','جنوب سيناء','مطروح','الوادي الجديد','البحر الأحمر'];
  return val && govs.some(function(g){ return String(val).includes(g); });
}

async function scanData(){
  log('🔍 جاري الفحص...', '#f9ca24');
  var snap = await db.collection(currentCol).get();
  allDocs = [];
  snap.docs.forEach(function(d){ allDocs.push(Object.assign({fbId:d.id}, d.data())); });
  
  document.getElementById('total-count').textContent = allDocs.length + ' استشاري';
  
  issuesList = [];
  allDocs.forEach(function(r){
    var issues = [];
    // موبايل في spec
    if(r.spec && isPhone(r.spec)) issues.push({field:'spec_phone', issue:'موبايل في التخصص', val:r.spec});
    // إيميل في spec
    if(r.spec && isEmail(r.spec)) issues.push({field:'spec_email', issue:'إيميل في التخصص', val:r.spec});
    // إيميل في spec2
    if(r.spec2 && isEmail(r.spec2)) issues.push({field:'spec2_email', issue:'إيميل في spec2', val:r.spec2});
    // موبايل في gov
    if(r.gov && isPhone(r.gov)) issues.push({field:'gov_phone', issue:'موبايل في المحافظة', val:r.gov});
    // خبرة في email
    if(r.email && !isEmail(r.email) && r.email.length > 5) issues.push({field:'email_wrong', issue:'قيمة غلط في email', val:r.email});
    // إيميل في bio
    if(r.bio && isEmail(r.bio)) issues.push({field:'bio_email', issue:'إيميل في النبذة', val:r.bio});
    // موبايل في bio
    if(r.bio && isPhone(r.bio)) issues.push({field:'bio_phone', issue:'موبايل في النبذة', val:r.bio});
    // محافظة فاضية
    if(!r.gov || r.gov === '—') issues.push({field:'gov_empty', issue:'محافظة فاضية', val:''});
    
    // فحص خاص بالموردين
    if(currentCol === 'suppliers'){
      if(r.cat && isPhone(r.cat)) issues.push({field:'cat', issue:'رقم موبايل في النشاط', val:r.cat});
      if(r.cat && isEmail(r.cat)) issues.push({field:'cat', issue:'إيميل في النشاط', val:r.cat});
      if(r.address && isPhone(r.address)) issues.push({field:'address', issue:'رقم موبايل في العنوان', val:r.address});
    }
    
    if(issues.length > 0){
      issuesList.push({fbId:r.fbId, name:r.name||'—', issues:issues, data:r});
    }
  });
  
  document.getElementById('issues-count').textContent = issuesList.length + ' سجل فيه مشكلة';
  
  var html = issuesList.slice(0,30).map(function(item){
    return '<div class="issue">' +
      '<div class="issue-name">👤 '+item.name+'</div>' +
      item.issues.map(function(iss){
        return '<div class="issue-detail">⚠️ '+iss.issue+': <strong>'+String(iss.val||'').substring(0,40)+'</strong></div>';
      }).join('') +
    '</div>';
  }).join('');
  
  document.getElementById('issues-list').innerHTML = html || '<div style="color:#00b894;text-align:center;padding:20px">✅ البيانات نظيفة!</div>';
  
  if(issuesList.length > 0){
    document.getElementById('fix-btn').style.display='block';
  }
  log('✅ فحص انتهى: '+allDocs.length+' سجل، '+issuesList.length+' مشكلة', '#00b894');
}

async function fixData(){
  if(!confirm('هيصلح '+issuesList.length+' سجل — متأكد؟')) return;
  var fixed = 0;
  for(var i=0; i<issuesList.length; i++){
    var item = issuesList[i];
    var r = item.data;
    var updated = {};
    
    item.issues.forEach(function(iss){
      if(iss.field==='spec' && isPhone(r.spec)){
        if(!r.phone) updated.phone = r.spec;
        updated.spec = 'غير محدد';
        log('📞 '+r.name+': نقل موبايل من spec', '#f9ca24');
      }
      if(iss.field==='spec' && isEmail(r.spec)){
        if(!r.email) updated.email = r.spec;
        updated.spec = 'غير محدد';
        log('✉️ '+r.name+': نقل إيميل من spec', '#f9ca24');
      }
      if(iss.field==='spec2' && isEmail(r.spec2)){
        if(!r.email) updated.email = r.spec2;
        updated.spec2 = '';
        log('✉️ '+r.name+': نقل إيميل من spec2', '#f9ca24');
      }
      if(iss.field==='cat' && isPhone(r.cat)){
        if(!r.phone) updated.phone = r.cat;
        updated.cat = '—';
        log('📞 '+r.name+': نقل موبايل من cat', '#f9ca24');
      }
      if(iss.field==='cat' && isEmail(r.cat)){
        if(!r.email) updated.email = r.cat;
        updated.cat = '—';
        log('✉️ '+r.name+': نقل إيميل من cat', '#f9ca24');
      }
      if(iss.field==='gov' && isPhone(r.gov)){
        if(!r.phone) updated.phone = r.gov;
        updated.gov = '—';
        log('📍 '+r.name+': نقل موبايل من gov', '#f9ca24');
      }
    });
    
    if(Object.keys(updated).length > 0){
      try{
        await db.collection(currentCol).doc(item.fbId).update(updated);
        fixed++;
        log('✅ صُلح: '+r.name, '#00b894');
      }catch(e){ log('❌ فشل: '+r.name+' - '+e.message, '#e05050'); }
    }
    await new Promise(r=>setTimeout(r,100));
  }
  log('🎉 انتهى! صُلح '+fixed+' سجل', '#f9ca24');
  alert('✅ تم إصلاح '+fixed+' سجل!');
  scanData();
}

// Manual edit
function openManualEdit(idx){
  var item = issuesList[idx];
  if(!item) return;
  var r = item.data;
  var fields = Object.keys(r).filter(function(k){ return k !== 'fbId' && typeof r[k] !== 'object'; });
  var html = '<div style="position:fixed;inset:0;background:rgba(0,0,0,.6);z-index:999;display:flex;align-items:center;justify-content:center;padding:16px">' +
    '<div style="background:white;border-radius:14px;padding:20px;width:100%;max-width:400px;max-height:80vh;overflow-y:auto">' +
    '<div style="font-size:14px;font-weight:800;color:#1a3a6e;margin-bottom:14px">✏️ تعديل: '+r.name+'</div>' +
    fields.map(function(k){
      return '<div style="margin-bottom:8px">' +
        '<label style="font-size:11px;font-weight:700;color:#6b7a8d;display:block;margin-bottom:3px">'+k+'</label>' +
        '<input id="me-'+k+'" value="'+String(r[k]||'').replace(/"/g,"&quot;").replace(/'/g,"&#39;")+'" style="width:100%;padding:8px;border:1.5px solid #dde6f0;border-radius:8px;font-family:Cairo,sans-serif;font-size:12px;direction:'+(k==='phone'||k==='email'?'ltr':'rtl')+'">' +
      '</div>';
    }).join('') +
    '<div style="display:flex;gap:8px;margin-top:12px">' +
      '<button onclick="saveManualEdit(''+item.fbId+'','+JSON.stringify(fields).replace(/"/g,"'")+')" style="flex:1;padding:10px;background:linear-gradient(135deg,#00703a,#00b894);color:white;border:none;border-radius:8px;font-family:Cairo,sans-serif;font-size:13px;font-weight:700;cursor:pointer">💾 حفظ</button>' +
      '<button onclick="document.getElementById('manual-modal').remove()" style="flex:0.4;padding:10px;background:#feeaea;color:#e05050;border:none;border-radius:8px;font-family:Cairo,sans-serif;font-size:13px;font-weight:700;cursor:pointer">إلغاء</button>' +
    '</div>' +
    '</div></div>';
  var modal = document.createElement('div');
  modal.id = 'manual-modal';
  modal.innerHTML = html;
  document.body.appendChild(modal);
}

async function saveManualEdit(fbId, fields){
  var updated = {};
  fields.forEach(function(k){
    var el = document.getElementById('me-'+k);
    if(el) updated[k] = el.value.trim();
  });
  try{
    await db.collection(currentCol).doc(fbId).update(updated);
    log('✅ تم حفظ التعديل اليدوي: '+fbId.substring(0,8), '#00b894');
    var m = document.getElementById('manual-modal');
    if(m) m.remove();
    scanData();
  }catch(e){ log('❌ '+e.message, '#e05050'); }
}
</script>
</body>
</html>
