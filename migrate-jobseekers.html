    "bio": "Care Egypt | خدمات | السادة  الكرام،\nيسعدنا أن نشارككم أن *مشغل غالية* أصبح الآن يعمل بشكل كامل كمشروع اجتماعي تابع *لمؤسسة كير مصر*.\n \nواستنادًا إلى نجاح المشروع الممول من بنك الإسكندرية، والذي قمنا من خلاله بتدريب 170 سيدة على الخياطة والتطريز، أصبح المشغل اليوم جاهزًا لتوسيع نطاق تأثيره وشراكاته.\nتنطلق رسالة مشغل غالية من إتاحة فرص دخل مستدامة للسيدات المصريات واللاجئات من الفئات الأكثر احتياجًا، حيث يساهم كل منتج يتم تصنيعه وكل طلبية يتم تنفيذها بشكل مباشر في تحسين سبل معيشتهن.\n\nيسعدنا أن نقدم مجالين رئيسيين للتعاون:\n\n*1. إنتاج الهدايا الدعائية للشركات*\nيقوم مشغل غالية بإنتاج هدايا دعائية يدوية عالية الجودة بأسعار تنافسية، مع إمكانية تخصيص كل منتج بما يتناسب مع احتياجاتكم المختلفة. كما تحمل هذه المنتجات أثرًا اجتماعيًا حقيقيًا، مما يجعل هدايا مؤسستكم مميزة وهادفة في الوقت نفسه.\n*2. مركز تدريبي لمشروعات تمكين المرأة*\nيعمل مشغل غالية أيضًا كمركز تدريبي للمشروعات التي تهدف إلى تزويد السيدات بمهارات عملية مدرة للدخل. ومن خلال مدرباتنا ذوات الخبرة — واللاتي كنّ في الأصل من المتدربات لدينا — بالإضافة إلى منهج تدريبي منظم ومجرب، نقدم تدريبات في مجالات الخياطة والتطريز وأي مهارات حرفية ذات صلة وفقًا لاحتياجات المشروع، بما يدعم التمكين الاقتصادي المستدام للمرأة.\n\nيسعدنا استكشاف فرص التعاون الممكنة معكم، ومناقشة سبل العمل المشترك لتحقيق أثر اقتصادي واجتماعي إيجابي.\n\nيرجى عدم التردد في التواصل معنا لمعرفة المزيد أو لترتيب اجتماع او لطلب الكتالوج الخاص بمنتجاتنا.\n\nمع خالص التحيات،\nفريق مشغل غالية\nمؤسسة كير مصر\n\nللتواصل \nAmira.Ragy@cef-eg.org"

    "exp": "",
    "jobType": "",
    "phone": "https://care.org.eg/job/%d8%a7%d9%84%d9%85%d9%86%d8%a7%d9%82%d8%b5%d8%a9-%d8%a7%d9%84%d8%b9%d8%a7%d9%85%d8%a9-%d8%b1%d9%82%d9%85-3-%d9%84%d8%b3%d9%86%d8%a9-2026/",
    "email": "https://care.org.eg/job/%d8%a7%d9%84%d9%85%d9%86%d8%a7%d9%82%d8%b5%d8%a9-%d8%a7%d9%84%d8%b9%d8%a7%d9%85%d8%a9-%d8%b1%d9%82%d9%85-3-%d9%84%d8%b3%d9%86%d8%a9-2026/",
    "bio": "CARE EGYPT | تدريب وبناء قدرات | تنفيذ برنامج تدريب المدربين الشباب على مهارات القيادة والتكيف المناخي وإعدادهم للمشاركة في مؤتمر المناخ\n\n\nمقدمة عن مؤسسة كير مصر للتنمية\n\nمؤسسة كير مصر للتنمية هي مؤسسة أهلية مسجلة في الإدارة المركزية للجمعيات بوزارة التضامن الاجتماعي برقم “833 لسنة 2018” ويقع مقرها في 5 شارع أسماء فهمي – الدور الخامس (قطعة رقم 1 – المربع Y ) قسم 1 مدينة نصر، القاهرة، مصر، وتخضع المؤسسة لأحكام قانون تنظيم العمل الأهلي رقم 149 لسنة 2019.\n\nتستند مؤسسة كير مصر للتنمية على إرث وخبرات كير الدولية في مصر منذ عام 1954، من خلال تصميم وتنفيذ وإدارة برامج ومشاريع تنموية تهدف إلى مساعدة المجتمعات المحلية الأكثر احتياجًا في مصر، من خلال بناء شراكات استراتيجية مع القطاع الحكومي والقطاع الخاص ومؤسسات المجتمع المدني، للمساعدة في تلبية الاحتياجات الأساسية وتحسين جودة ونوعية الحياة بشكل مستدام ومتسق مع الثقافة، والواقع، والسياق المحلي ،والوطني.\n\nتركز المؤسسة تدخلاتها وتصمم برامجها في مجالات التمكين الاقتصادي والاجتماعي للمرأة المصرية، وتطوير وتحسين البيئة التعليمية، ودعم القطاع الزراعي وخاصة صغار المزارعين، وتحسين الأداء الحكومي ودعم عمليات بناء الثقة بين شركاء التنمية من خلال تطبيق أدوات ومنهجيات الحوكمة والمساءلة المجتمعية، وذلك من خلال استثمار الطاقات والأفكار وتبني المشاريع التي تتوافق مع تنمية وتحسين الظروف الاقتصادية والمعيشية لهذه المجتمعات للتعامل مع معالجة الأسباب الجذرية للفقر.\n\nكما تلتزم المؤسسة بتعزيز دور المجتمع المدني المحلي من خلال إشراكه كشريك في جميع مشاريع المؤسسة بطريقة تضمن بناء قدراته وتمكينه من القيام بالدور التنموي المطلوب في خطط وبرامج التنمية القطاعية والجغرافية للحكومة.\n\nتعمل المؤسسة على استخلاص أهم التجارب الدولية في جميع مجالات التنمية وعرضها في السياقين المحلي والوطني، بالإضافة إلى العمل على تسليط الضوء على التجارب المحلية ونشرها على المستوى العالمي، وذلك للاستفادة من التجارب العالمية وتقديم النماذج التنموية المصرية إلى المهتمين والفاعلين على المستوى العالمي.\n\nنبذه عن المشروع\n\nوفي هذا الإطار، يأتي مشروع تعزيز دور المجتمع المدني والشباب في العمل المناخي في مصر كمبادرة تمتد لثلاث سنوات بتمويل من الوزارة الاتحادية الألمانية للتعاون الاقتصادي ,والتنمية  (BMZ)، وتنفيذ مؤسسة كير مصر خلال الفترة من نوفمبر 2025 وحتى أكتوبر 2028. ويهدف المشروع إلى تعزيز إسهام منظمات المجتمع المدني التي يقودها الشباب في دعم جهود مصر للتكيف مع تغير المناخ، بما يسهم في تعزيز القدرة الوطنية على  التكيف ودعم الاستراتيجيات الوطنية ذات الصلة، ويسعى إلى خلق نموذج مستدام للتعاون بين المنظمات الشبابية، والجهات الحكومية، والقطاع الخاص، بما يعزز العمل المناخي المجتمعي ويضمن استدامة الأثر على المدى الطويل.\n\nويجري تنفيذ المشروع بالشراكة مع 25 منظمة من منظمات المجتمع المدني التي يقودها الشباب في ثلاث محافظات هي القاهرة وأسيوط وبني سويف. ومن خلال هذا النموذج القائم علي  الشراكة، يسعى المشروع إلى تعزيز القدرات المؤسسية والفنية للفاعلين الشباب وتمكين المنظمات الشبابية من لعب دور فاعل في التكيف مع تغير المناخ والمساهمة في بناء مجتمعات أكثر قدرة على الصمود خاصة في المحافظات الثلاثة التي يستهدفها المشروع، بما يدعم توطين تدخلات العمل المناخي علي  المستوى المحلي.\n\nوتشمل المكونات الرئيسية للمشروع تقديم حزمة متكاملة من أنشطة بناء القدرات، من بينها برامج تدريب المدربين (ToT) وورش العمل الفنية المتخصصة التي يقدمها خبراء دوليون ومحليون، بهدف إعداد وتأهيل قيادات شبابية قادرة على نقل المعرفة إلى مجتمعاتها، بما يسهم في تعزيز الوعي البيئي، وتوسيع مشاركة الشباب، خاصة الشابات، في تصميم وتنفيذ حلول عملية لمواجهة آثار تغير المناخ. وبالتوازي مع ذلك، ينفذ المشروع مجموعة من مبادرات مناخية محلية ومبادرات التوعية المجتمعية التي تتضمن فعاليات وحملات وأنشطة تواصل رقمية تهدف إلى تعزيز فهم المجتمعات المحلية لتأثيرات تغير المناخ وسبل التكيف معه إلى جانب دعم جهود المناصرة والتأثير في السياسات البيئية على المستوى المحلي.\n\nوفي إطار مكون إنتاج المعرفة والأدلة، سيقوم المشاركون من الشباب بتنفيذ أبحاث تطبيقية وإعداد توصيات سياسات تستند إلى السياق المحلي. وستمر هذه التوصيات بعملية مراجعة وتحقق منظمة بمشاركة أصحاب المصلحة المعنيين، بما في ذلك الجهات الحكومية وممثلي القطاع الخاص وشركاء التنمية ومنظمات المجتمع المدني. ويهدف هذا النهج التشاركي إلى تعزيز الحوار حول السياسات المناخية ودعم حوكمة مناخية أكثر شمولا على  المستوى المحلي.\nكراسة الشروط للمناقصه رقم 3 لسنة 2026\n\nTOT_TOR_EN\n\nعلى ان تكون جلسة الاستفسارات الخاصة بالمناقصه ( أونلاين ) عن طريق اللينك المرفق ادناه\nhttps://teams.microsoft.com/meet/353500169010285?p=dLcu6KR9dGEWzAEUbO"

function addLog(msg){
  document.getElementById('log').textContent += msg + '\n';
}

async function checkExisting(){
  document.getElementById('status').textContent = '⏳ جاري الفحص...';
  document.getElementById('log').textContent = '';
  
  var snap = await db.collection('jobseekers').get();
  var existing = {};
  snap.docs.forEach(function(d){
    var r = d.data();
    if(r.phone) existing[r.phone.replace(/[^0-9]/g,'')] = true;
    if(r.email) existing[r.email.toLowerCase()] = true;
  });
  
  addLog('موجود في Firebase: ' + snap.size + ' سجل');
  
  toUpload = CSV_DATA.filter(function(r){
    var phone = (r.phone||'').replace(/[^0-9]/g,'');
    var email = (r.email||'').toLowerCase();
    return !existing[phone] && !existing[email];
  });
  
  addLog('جديد مش موجود: ' + toUpload.length + ' سجل');
  addLog('مكرر (موجود بالفعل): ' + (CSV_DATA.length - toUpload.length) + ' سجل');
  
  document.getElementById('status').textContent = toUpload.length + ' سجل جديد هيتضاف';
  
  if(toUpload.length > 0){
    document.getElementById('uploadBtn').style.display = 'block';
    document.getElementById('uploadBtn').textContent = '⬆️ رفع ' + toUpload.length + ' سجل جديد';
  } else {
    addLog('✅ كل البيانات موجودة بالفعل!');
  }
}

async function doUpload(){
  if(!confirm('هترفع ' + toUpload.length + ' سجل جديد — متأكد؟')) return;
  document.getElementById('uploadBtn').disabled = true;
  var uploaded = 0;
  
  for(var i=0; i<toUpload.length; i++){
    var r = toUpload[i];
    try{
      await db.collection('jobseekers').add({
        name:    r.name,
        field:   r.field,
        gov:     r.gov,
        exp:     r.exp,
        jobType: r.jobType,
        phone:   r.phone,
        email:   r.email,
        bio:     r.bio,
        date:    r.date,
        source:  'google_sheets',
        timestamp: firebase.firestore.FieldValue.serverTimestamp()
      });
      uploaded++;
      addLog('✅ ' + r.name);
    } catch(e){
      addLog('❌ ' + r.name + ': ' + e.message);
    }
    await new Promise(function(res){ setTimeout(res, 150); });
    document.getElementById('status').textContent = uploaded + ' / ' + toUpload.length;
  }
  
  addLog('🎉 انتهى! تم رفع ' + uploaded + ' سجل');
  document.getElementById('uploadBtn').style.display = 'none';
}
</script>
