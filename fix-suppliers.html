function log(msg, color='#a8d8ea'){
  var l = document.getElementById('log');

  l.scrollTop = l.scrollHeight;

async function clearSuppliers(){
  if(!confirm('هتمسح كل الموردين من Firebase — متأكد؟')) return;
  log('🗑️ جاري المسح...', '#f9ca24');
  try{
    var snap = await db.collection('suppliers').get();
    var batch = db.batch();
    snap.forEach(function(d){ batch.delete(d.ref); });
    await batch.commit();
    log('✅ تم مسح '+snap.size+' مورد', '#00b894');
  }catch(e){ log('❌ '+e.message, '#e05050'); }
}

async function startUpload(){
  log('🚀 بدأ الرفع... '+suppliers.length+' مورد', '#f9ca24');
  var success = 0;
  var batchSize = 50;
  for(var i=0; i<suppliers.length; i+=batchSize){
    var batch = db.batch();
    var chunk = suppliers.slice(i, i+batchSize);
    chunk.forEach(function(s){
      var ref = db.collection('suppliers').doc();
      batch.set(ref, Object.assign({}, s, {timestamp: firebase.firestore.FieldValue.serverTimestamp()}));
    });
    try{
      await batch.commit();
      success += chunk.length;
      var pct = Math.round(success/suppliers.length*100);
      document.getElementById('pbar').style.width = pct+'%';
      log('✅ '+success+' / '+suppliers.length, '#00b894');
    }catch(e){ log('❌ '+e.message, '#e05050'); }
    await new Promise(r=>setTimeout(r,300));
  }
  log('🎉 انتهى! تم رفع '+success+' مورد', '#f9ca24');
  alert('🎉 تم رفع '+success+' مورد!');
}
</script>
</body>
</html>
